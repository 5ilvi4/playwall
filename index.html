<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Body Runner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
    }
    h1 {
      font-size: 22px;
      letter-spacing: 4px;
      color: #e94560;
      margin-bottom: 14px;
    }
    #layout {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }
    #gameWrap { position: relative; }
    #gameCanvas {
      display: block;
      border-radius: 12px;
      border: 2px solid #1a1a4e;
    }
    #overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.88);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
    }
    #overlay h2 { font-size: 38px; color: #e94560; margin-bottom: 14px; }
    #overlay p  { color: #aaa; margin: 5px 0; font-size: 15px; }
    #startBtn {
      margin-top: 22px;
      padding: 13px 46px;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
    }
    #startBtn:hover { background: #c73652; }

    /* camera panel */
    #camPanel { width: 260px; }
    #camWrap {
      position: relative;
      width: 260px;
      height: 195px;
      border-radius: 10px;
      overflow: hidden;
      background: #111;
    }
    #webcam {
      position: absolute;
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }
    #poseCanvas {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      transform: scaleX(-1);
    }
    #infoBox {
      margin-top: 10px;
      padding: 10px 12px;
      background: #1a1a2e;
      border-radius: 8px;
    }
    #statusTxt { font-size: 13px; color: #888; }
    #gestureTxt {
      font-size: 24px;
      font-weight: bold;
      color: #e94560;
      min-height: 30px;
      margin-top: 3px;
    }
    #keys {
      margin-top: 10px;
      padding: 10px 12px;
      background: #1a1a2e;
      border-radius: 8px;
      font-size: 12px;
      color: #555;
      line-height: 1.9;
    }
    #keys span { color: #888; }
  </style>
</head>
<body>
  <h1>BODY RUNNER</h1>
  <div id="layout">

    <!-- GAME -->
    <div id="gameWrap">
      <canvas id="gameCanvas" width="420" height="620"></canvas>
      <div id="overlay">
        <h2>BODY RUNNER</h2>
        <p>Lean <strong>LEFT / RIGHT</strong> to switch lanes</p>
        <p><strong>JUMP</strong> to leap over obstacles</p>
        <p><strong>SQUAT</strong> to duck under barriers</p>
        <p style="margin-top:12px;color:#e94560;font-size:13px;">Allow camera access when prompted</p>
        <button id="startBtn" onclick="startGame()">PLAY</button>
      </div>
    </div>

    <!-- CAMERA -->
    <div id="camPanel">
      <div id="camWrap">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="poseCanvas" width="260" height="195"></canvas>
      </div>
      <div id="infoBox">
        <div id="statusTxt">Starting camera…</div>
        <div id="gestureTxt">—</div>
      </div>
      <div id="keys">
        <span>Keyboard fallback:</span><br>
        ← → = switch lanes<br>
        ↑ / Space = jump<br>
        ↓ = squat
      </div>
    </div>

  </div>

  <!-- MediaPipe CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

  <script>
  // ─────────────────────────────────────────────
  //  CANVAS SETUP
  // ─────────────────────────────────────────────
  const gc  = document.getElementById('gameCanvas');
  const ctx = gc.getContext('2d');
  const W   = gc.width;
  const H   = gc.height;

  const LANE_X = [W * 0.25, W * 0.5, W * 0.75];
  const ROAD_L = W * 0.10;
  const ROAD_R = W * 0.90;

  // ─────────────────────────────────────────────
  //  GAME STATE
  // ─────────────────────────────────────────────
  let state = 'menu';   // menu | playing | dead
  let score, speed, frame, bgScroll;

  const PL = {           // player
    lane: 1, x: LANE_X[1], targetX: LANE_X[1],
    groundY: H - 100,    // feet y
    w: 36, h: 56,
    jumping: false, jumpVel: 0, jumpY: 0,
    sliding: false, slideTimer: 0,
    trail: []
  };

  let obstacles = [];
  let coins     = [];
  let sparks    = [];

  // cooldowns
  let jumpCd = 0, slideCd = 0, leanCd = 0;

  // ─────────────────────────────────────────────
  //  GESTURE → GAME
  // ─────────────────────────────────────────────
  const statusEl  = document.getElementById('statusTxt');
  const gestureEl = document.getElementById('gestureTxt');

  function showG(g) { gestureEl.textContent = g; }

  function handleGesture(g) {
    if (state === 'dead' && g === 'JUMP') { startGame(); return; }
    if (state !== 'playing') return;

    if      (g === 'LEFT'  && PL.lane > 0 && leanCd <= 0) { PL.lane--; PL.targetX = LANE_X[PL.lane]; leanCd = 28; }
    else if (g === 'RIGHT' && PL.lane < 2 && leanCd <= 0) { PL.lane++; PL.targetX = LANE_X[PL.lane]; leanCd = 28; }
    else if (g === 'JUMP'  && !PL.jumping && jumpCd <= 0)  { PL.jumping = true; PL.jumpVel = -17; jumpCd = 35; }
    else if (g === 'SQUAT' && !PL.sliding && slideCd <= 0) { PL.sliding = true; PL.slideTimer = 44; slideCd = 60; }
  }

  // ─────────────────────────────────────────────
  //  MEDIAPIPE POSE
  // ─────────────────────────────────────────────
  const videoEl = document.getElementById('webcam');
  const poseC   = document.getElementById('poseCanvas');
  const pCtx    = poseC.getContext('2d');

  let baseHipY   = null;
  let calCount   = 0;
  const CAL_N    = 40;
  let hipSamples = [];
  let gCooldown  = 0;

  const mpPose = new Pose({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`
  });
  mpPose.setOptions({
    modelComplexity: 1,
    smoothLandmarks: true,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5
  });

  mpPose.onResults(results => {
    pCtx.save();
    pCtx.clearRect(0, 0, poseC.width, poseC.height);
    pCtx.drawImage(results.image, 0, 0, poseC.width, poseC.height);

    if (results.poseLandmarks) {
      drawConnectors(pCtx, results.poseLandmarks, POSE_CONNECTIONS, { color: '#00ff88', lineWidth: 2 });
      drawLandmarks(pCtx, results.poseLandmarks, { color: '#ff4466', lineWidth: 1, radius: 3 });

      const lm = results.poseLandmarks;
      const ls = lm[11], rs = lm[12]; // shoulders
      const lh = lm[23], rh = lm[24]; // hips

      if (ls && rs && lh && rh && ls.visibility > 0.4 && rs.visibility > 0.4) {
        const shX  = (ls.x + rs.x) / 2;
        const hipX = (lh.x + rh.x) / 2;
        const hipY = (lh.y + rh.y) / 2;

        // Calibration
        if (calCount < CAL_N) {
          hipSamples.push(hipY);
          calCount++;
          statusEl.textContent = `Calibrating… ${calCount}/${CAL_N}`;
          if (calCount === CAL_N) {
            baseHipY = hipSamples.reduce((a, b) => a + b) / CAL_N;
            statusEl.textContent = 'Ready! Move your body!';
          }
        } else {
          if (gCooldown > 0) { gCooldown--; }
          else {
            const rise = baseHipY - hipY;       // positive = body went up (jump)
            const drop = hipY - baseHipY;       // positive = body went down (squat)
            const lean = shX - hipX;            // positive = shoulders right of hips in raw image

            // In a front-facing camera (raw, unmirrored):
            // person leans to THEIR left → shoulders shift to image RIGHT → lean > 0 → game LEFT
            // person leans to THEIR right → shoulders shift to image LEFT → lean < 0 → game RIGHT

            let detected = null;
            if      (rise > 0.08)   { detected = 'JUMP';  gCooldown = 20; }
            else if (drop > 0.07)   { detected = 'SQUAT'; gCooldown = 30; }
            else if (lean > 0.07)   { detected = 'LEFT';  gCooldown = 22; }
            else if (lean < -0.07)  { detected = 'RIGHT'; gCooldown = 22; }

            if (detected) { showG(detected); handleGesture(detected); }
          }
        }
      }
    }
    pCtx.restore();
  });

  const cam = new Camera(videoEl, {
    onFrame: async () => { await mpPose.send({ image: videoEl }); },
    width: 640, height: 480
  });
  cam.start()
    .then(()  => statusEl.textContent = 'Camera active. Calibrating…')
    .catch(e  => statusEl.textContent = 'Camera error: ' + e.message);

  // ─────────────────────────────────────────────
  //  KEYBOARD FALLBACK
  // ─────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    const map = { ArrowLeft:'LEFT', ArrowRight:'RIGHT', ArrowUp:'JUMP', ' ':'JUMP', ArrowDown:'SQUAT' };
    if (map[e.key]) { showG(map[e.key]); handleGesture(map[e.key]); e.preventDefault(); }
    if (e.key === 'Enter' && state === 'dead') startGame();
  });

  // ─────────────────────────────────────────────
  //  GAME LOGIC
  // ─────────────────────────────────────────────
  function startGame() {
    state = 'playing';
    score = 0; speed = 3; frame = 0; bgScroll = 0;
    Object.assign(PL, {
      lane: 1, x: LANE_X[1], targetX: LANE_X[1],
      jumping: false, jumpVel: 0, jumpY: 0,
      sliding: false, slideTimer: 0, trail: []
    });
    obstacles = []; coins = []; sparks = [];
    jumpCd = 0; slideCd = 0; leanCd = 0;
    document.getElementById('overlay').style.display = 'none';
    requestAnimationFrame(loop);
  }

  // Spawn obstacles: type 'barrier' (jump over) or 'hang' (duck under)
  function spawnObstacle() {
    const type = Math.random() < 0.45 ? 'hang' : 'barrier';
    // For a hang obstacle, spawn only 1 lane. For barrier, maybe 1-2 lanes.
    const count = (type === 'barrier' && Math.random() < 0.3) ? 2 : 1;
    const lanes = shuffle([0,1,2]).slice(0, count);
    lanes.forEach(lane => {
      obstacles.push({
        lane, x: LANE_X[lane],
        y: -80,
        w: 40,
        h: type === 'barrier' ? 55 : 24,
        type
      });
    });
  }

  function spawnCoin() {
    const lane = Math.floor(Math.random() * 3);
    // spawn a small row of coins
    for (let i = 0; i < 3; i++) {
      coins.push({ x: LANE_X[lane], y: -30 - i * 32, r: 11, lane });
    }
  }

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function addSparks(x, y, color, n) {
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2;
      const v = 2 + Math.random() * 5;
      sparks.push({ x, y, vx: Math.cos(a)*v, vy: Math.sin(a)*v, life: 28, maxLife: 28, color });
    }
  }

  // Collision detection
  // barrier: ground-level, jump over. hang: head-level, squat under.
  function collides(o) {
    // x check: same lane or within width
    if (Math.abs(PL.x - o.x) > (PL.w/2 + o.w/2 - 6)) return false;

    const ph   = PL.sliding ? PL.h * 0.42 : PL.h;
    const feet = PL.groundY - PL.jumpY;        // feet y (moves up when jumping)
    const top  = feet - ph;                    // head y

    if (o.type === 'barrier') {
      // barrier occupies from its y to y+h (ground-anchored)
      // it "hits" when o.y is near player ground level
      const oTop    = o.y;
      const oBottom = o.y + o.h;
      // player jumping: feet rise, if feet above obstacle top → clear
      if (feet < oTop) return false;        // player is above obstacle
      if (top  > oBottom) return false;     // player is below (shouldn't happen)
      return oBottom > top && oTop < feet;
    } else {
      // hang: obstacle at head height
      // when o.y is near PL.groundY - PL.h (head region), collision happens
      // hang obstacle bottom edge = o.y + o.h
      // player top = top
      // collision if: NOT (sliding and top > o.y + o.h)
      const oTop    = o.y;
      const oBottom = o.y + o.h;
      if (oBottom < top)  return false;  // obstacle above player head (cleared)
      if (oTop > feet)    return false;  // obstacle below player feet
      // if sliding: player is shorter, check if top cleared
      if (PL.sliding && top > oTop + 4) return false;
      return true;
    }
  }

  // ─────────────────────────────────────────────
  //  DRAW HELPERS
  // ─────────────────────────────────────────────
  function drawBG() {
    const sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, '#080820');
    sky.addColorStop(1, '#12122e');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H);

    // road
    ctx.fillStyle = '#0e0e28';
    ctx.fillRect(ROAD_L, 0, ROAD_R - ROAD_L, H);

    // lane dashes
    ctx.save();
    ctx.strokeStyle = 'rgba(233,69,96,0.35)';
    ctx.lineWidth = 2;
    ctx.setLineDash([26, 18]);
    ctx.lineDashOffset = -(bgScroll % 44);
    for (const lx of [W * 0.375, W * 0.625]) {
      ctx.beginPath(); ctx.moveTo(lx, 0); ctx.lineTo(lx, H); ctx.stroke();
    }
    ctx.restore();

    // side trim
    ctx.fillStyle = '#06061a';
    ctx.fillRect(0, 0, ROAD_L, H);
    ctx.fillRect(ROAD_R, 0, W - ROAD_R, H);
  }

  function drawPlayer() {
    const px = PL.x;
    const ph = PL.sliding ? PL.h * 0.42 : PL.h;
    const py = PL.groundY - PL.jumpY;

    // trail
    PL.trail.push({ x: px, y: py, ph });
    if (PL.trail.length > 8) PL.trail.shift();
    PL.trail.forEach((t, i) => {
      ctx.globalAlpha = (i / PL.trail.length) * 0.22;
      ctx.fillStyle = '#e94560';
      ctx.beginPath();
      ctx.roundRect(t.x - PL.w/2, t.y - t.ph, PL.w, t.ph, 6);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // body
    const bg = ctx.createLinearGradient(px - PL.w/2, 0, px + PL.w/2, 0);
    bg.addColorStop(0, '#e94560');
    bg.addColorStop(1, '#ff6b8a');
    ctx.fillStyle = bg;
    ctx.beginPath();
    ctx.roundRect(px - PL.w/2, py - ph, PL.w, ph, 8);
    ctx.fill();

    // head
    if (!PL.sliding) {
      ctx.fillStyle = '#ffd93d';
      ctx.beginPath();
      ctx.arc(px, py - ph - 13, 13, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#1a1a2e';
      ctx.beginPath();
      ctx.arc(px - 4, py - ph - 15, 3, 0, Math.PI * 2);
      ctx.arc(px + 4, py - ph - 15, 3, 0, Math.PI * 2);
      ctx.fill();
    }

    // jump shadow
    if (PL.jumpY > 2) {
      const s = Math.max(0.2, 1 - PL.jumpY / 130);
      ctx.globalAlpha = 0.25 * s;
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.ellipse(px, PL.groundY, PL.w/2 * s, 7 * s, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  function drawObstacles() {
    obstacles.forEach(o => {
      if (o.type === 'barrier') {
        const g = ctx.createLinearGradient(o.x - o.w/2, o.y, o.x + o.w/2, o.y);
        g.addColorStop(0, '#e94560');
        g.addColorStop(1, '#c73652');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.roundRect(o.x - o.w/2, o.y, o.w, o.h, 6);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.12)';
        ctx.beginPath();
        ctx.roundRect(o.x - o.w/2 + 4, o.y + 5, o.w - 8, 8, 3);
        ctx.fill();
        ctx.fillStyle = 'white';
        ctx.font = 'bold 10px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('JUMP', o.x, o.y + o.h / 2);
      } else {
        // hang obstacle: draw as overhead beam
        const g = ctx.createLinearGradient(o.x - o.w/2, o.y, o.x + o.w/2, o.y);
        g.addColorStop(0, '#4ecdc4');
        g.addColorStop(1, '#26a69a');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.roundRect(o.x - o.w/2, o.y, o.w, o.h, 4);
        ctx.fill();
        ctx.fillStyle = 'white';
        ctx.font = 'bold 9px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('DUCK', o.x, o.y + o.h / 2);
      }
    });
  }

  function drawCoins() {
    coins.forEach(c => {
      const g = ctx.createRadialGradient(c.x - 3, c.y - 3, 1, c.x, c.y, c.r);
      g.addColorStop(0, '#fff59d');
      g.addColorStop(1, '#ffd700');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#b8860b';
      ctx.font = 'bold 10px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('★', c.x, c.y);
    });
  }

  function drawSparks() {
    sparks.forEach(s => {
      ctx.globalAlpha = s.life / s.maxLife;
      ctx.fillStyle = s.color;
      ctx.beginPath();
      ctx.arc(s.x, s.y, 3.5, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
  }

  function drawHUD() {
    // score
    ctx.fillStyle = 'white';
    ctx.font = 'bold 26px Arial';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText(score, 18, 14);

    // speed badge
    ctx.fillStyle = 'rgba(233,69,96,0.75)';
    ctx.beginPath();
    ctx.roundRect(W - 88, 10, 76, 24, 12);
    ctx.fill();
    ctx.fillStyle = 'white';
    ctx.font = 'bold 13px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('SPD ' + Math.floor(speed), W - 50, 22);

    // lane indicator
    for (let i = 0; i < 3; i++) {
      ctx.fillStyle = i === PL.lane ? '#e94560' : 'rgba(255,255,255,0.2)';
      ctx.beginPath();
      ctx.arc(W/2 - 16 + i * 16, H - 16, 5, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawDead() {
    ctx.fillStyle = 'rgba(0,0,0,0.78)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#e94560';
    ctx.font = 'bold 50px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('GAME OVER', W/2, H/2 - 44);
    ctx.fillStyle = 'white';
    ctx.font = '28px Arial';
    ctx.fillText('Score: ' + score, W/2, H/2 + 6);
    ctx.fillStyle = '#888';
    ctx.font = '15px Arial';
    ctx.fillText('Jump or press Enter to play again', W/2, H/2 + 46);
  }

  // ─────────────────────────────────────────────
  //  MAIN LOOP
  // ─────────────────────────────────────────────
  function loop() {
    ctx.clearRect(0, 0, W, H);

    bgScroll += speed;
    drawBG();

    if (state === 'playing') {
      frame++;
      speed  = Math.min(10, 3 + frame / 800);
      score  = Math.floor(frame * speed / 8);

      // player movement
      PL.x += (PL.targetX - PL.x) * 0.18;
      if (leanCd  > 0) leanCd--;
      if (jumpCd  > 0) jumpCd--;
      if (slideCd > 0) slideCd--;

      // jump physics
      if (PL.jumping) {
        PL.jumpY  -= PL.jumpVel;
        PL.jumpVel += 1.1;
        if (PL.jumpY <= 0) { PL.jumpY = 0; PL.jumping = false; PL.jumpVel = 0; }
      }

      // slide timer
      if (PL.sliding) { PL.slideTimer--; if (PL.slideTimer <= 0) PL.sliding = false; }

      // spawn
      const spawnInterval = Math.max(42, 110 - Math.floor(speed * 5));
      if (frame % spawnInterval === 0) spawnObstacle();
      if (frame % 75 === 0)           spawnCoin();

      // update obstacles
      obstacles = obstacles.filter(o => {
        o.y += speed;
        if (collides(o)) {
          addSparks(PL.x, PL.groundY - PL.h/2, '#e94560', 14);
          state = 'dead';
        }
        return o.y < H + 100;
      });

      // update coins
      coins = coins.filter(c => {
        c.y += speed;
        const dx = PL.x - c.x;
        const dy = (PL.groundY - PL.jumpY) - c.y;
        if (Math.hypot(dx, dy) < 26) {
          score += 10;
          addSparks(c.x, c.y, '#ffd700', 6);
          return false;
        }
        return c.y < H + 30;
      });

      // update sparks
      sparks = sparks.filter(s => {
        s.x += s.vx; s.y += s.vy; s.life--;
        return s.life > 0;
      });
    }

    drawSparks();
    drawObstacles();
    drawCoins();
    drawPlayer();
    drawHUD();

    if (state === 'dead') drawDead();

    if (state !== 'menu') requestAnimationFrame(loop);
  }
  </script>
</body>
</html>
